name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@38697555549f1db7851b81482ff19f1fa5c4fedc # v3

      - uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v3
        with:
          category: "/language:${{ matrix.language }}"
